<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Vendor Risk Platform{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    :root {
      --risk-critical: #dc3545;
      --risk-high:     #fd7e14;
      --risk-medium:   #ffc107;
      --risk-low:      #198754;
    }
    body { background: #f0f2f5; }

    /* ── Navbar ─────────────────────────────────────────────────────────── */
    .navbar { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); box-shadow: 0 2px 12px rgba(0,0,0,.3); }
    .navbar-brand { font-weight: 800; font-size: 1.15rem; letter-spacing: -.3px; }
    .navbar-brand .shield-icon { color: #60a5fa; margin-right: 6px; }
    .nav-link { color: rgba(255,255,255,.65) !important; font-size: .875rem; transition: color .15s; }
    .nav-link:hover, .nav-link.active { color: #fff !important; }
    .nav-link.active { font-weight: 600; }
    .btn-export-nav {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
      color: #e2e8f0 !important; font-size: .8rem; padding: 5px 14px; border-radius: 20px;
      transition: background .15s;
    }
    .btn-export-nav:hover { background: rgba(255,255,255,.2); text-decoration: none; }

    /* ── Risk stat cards ─────────────────────────────────────────────────── */
    .risk-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; transition: transform .2s, box-shadow .2s; }
    .risk-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .risk-card .card-body { padding: 1.25rem 1.5rem; }
    .risk-card .risk-num { font-size: 2.4rem; font-weight: 800; line-height: 1; }
    .risk-card .risk-lbl { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; opacity: .75; margin-top: 2px; }
    .risk-card .risk-icon { font-size: 2rem; opacity: .25; }
    .card-critical { background: linear-gradient(135deg, #dc3545, #b91c2c); color: #fff; }
    .card-high     { background: linear-gradient(135deg, #fd7e14, #c2560d); color: #fff; }
    .card-medium   { background: linear-gradient(135deg, #ffc107, #d97706); color: #fff; }
    .card-low      { background: linear-gradient(135deg, #198754, #15643e); color: #fff; }
    .card-alerts   { background: linear-gradient(135deg, #6366f1, #4338ca); color: #fff; }

    /* ── Chart card ──────────────────────────────────────────────────────── */
    .chart-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }

    /* ── Vendor table ────────────────────────────────────────────────────── */
    .vendor-table-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
    .vendor-table thead th { background: #f8fafc; border: none; font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: #64748b; padding: 14px 16px; }
    .vendor-table td { padding: 13px 16px; border-color: #f1f5f9; vertical-align: middle; }
    .vendor-row { cursor: pointer; transition: background .12s; }
    .vendor-row:hover { background: #f0f7ff !important; }
    .vendor-name { font-weight: 600; color: #0f172a; font-size: .92rem; }
    .vendor-id-sub { font-size: .72rem; color: #94a3b8; }
    .score-bar-wrap { min-width: 80px; }
    .score-val { font-weight: 700; font-size: .95rem; color: #0f172a; }

    /* ── Risk badges ─────────────────────────────────────────────────────── */
    .badge-risk { font-size: .72rem; font-weight: 700; letter-spacing: .3px; padding: 4px 10px; border-radius: 20px; }
    .badge-critical { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .badge-high     { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .badge-medium   { background: #fefce8; color: #854d0e; border: 1px solid #fde047; }
    .badge-low      { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    /* ── Alert badges ────────────────────────────────────────────────────── */
    .alert-pill { display: inline-flex; align-items: center; gap: 4px; font-size: .75rem;
                  padding: 3px 9px; border-radius: 20px; font-weight: 600; }
    .alert-pill-critical { background: #fef2f2; color: #b91c1c; }
    .alert-pill-high     { background: #fff7ed; color: #c2410c; }
    .alert-pill-none     { color: #cbd5e1; }

    /* ── Search / filter bar ─────────────────────────────────────────────── */
    .search-control { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 9px 14px; font-size: .9rem; }
    .search-control:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .filter-select { border-radius: 10px; border: 1.5px solid #e2e8f0; font-size: .85rem; }
    .filter-select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }

    /* ── Detail page ─────────────────────────────────────────────────────── */
    .risk-hero { border-radius: 16px; padding: 1.75rem 2rem; color: #fff; position: relative; overflow: hidden; }
    .risk-hero::after { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px;
                        border-radius: 50%; background: rgba(255,255,255,.08); }
    .risk-hero-critical { background: linear-gradient(135deg, #dc3545, #991b1b); }
    .risk-hero-high     { background: linear-gradient(135deg, #fd7e14, #92400e); }
    .risk-hero-medium   { background: linear-gradient(135deg, #ffc107, #92400e); }
    .risk-hero-low      { background: linear-gradient(135deg, #198754, #14532d); }
    .risk-hero .level-label { font-size: .75rem; opacity: .8; text-transform: uppercase; letter-spacing: .5px; }
    .risk-hero .level-val   { font-size: 2.2rem; font-weight: 900; line-height: 1.1; }
    .risk-hero .score-gauge { font-size: 1.2rem; font-weight: 700; }

    /* ── Score progress bar ──────────────────────────────────────────────── */
    .risk-progress { height: 8px; border-radius: 8px; background: rgba(255,255,255,.25); margin-top: 6px; }
    .risk-progress-fill { height: 100%; border-radius: 8px; background: #fff; transition: width .6s ease; }

    /* ── Section cards ───────────────────────────────────────────────────── */
    .section-card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .section-card .card-header { background: #fff; border-bottom: 1px solid #f1f5f9; border-radius: 14px 14px 0 0 !important; padding: .85rem 1.25rem; font-weight: 700; font-size: .9rem; color: #0f172a; }

    /* ── Compliance items ────────────────────────────────────────────────── */
    .comp-item { border-radius: 10px; padding: .9rem 1rem; font-size: .88rem; }
    .comp-ok   { background: #f0fdf4; border: 1.5px solid #86efac; }
    .comp-fail { background: #fef2f2; border: 1.5px solid #fca5a5; }
    .comp-na   { background: #f8fafc; border: 1.5px solid #e2e8f0; }

    /* ── Risk factor list ────────────────────────────────────────────────── */
    .risk-factor-item { background: #f8fafc; border-left: 3px solid #e2e8f0; border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: .875rem; color: #334155; }
    .risk-factor-item.sev-critical { border-left-color: #dc3545; background: #fef2f2; }
    .risk-factor-item.sev-high     { border-left-color: #fd7e14; background: #fff7ed; }
    .risk-factor-item.sev-medium   { border-left-color: #ffc107; background: #fefce8; }

    /* ── Recommendation box ──────────────────────────────────────────────── */
    .rec-box { background: #f8fafc; border-radius: 10px; border-left: 4px solid #6366f1; padding: 1rem 1.25rem; font-size: .9rem; color: #334155; line-height: 1.7; }
    .rec-box-critical { border-left-color: #dc3545; }
    .rec-box-high     { border-left-color: #fd7e14; }
    .rec-box-medium   { border-left-color: #ffc107; }
    .rec-box-low      { border-left-color: #198754; }

    /* ── Alert rows ──────────────────────────────────────────────────────── */
    .alert-item { border-radius: 10px; padding: .75rem 1rem; font-size: .875rem; display: flex; align-items: flex-start; gap: .75rem; }
    .alert-item-critical { background: #fef2f2; border: 1px solid #fecaca; }
    .alert-item-high     { background: #fff7ed; border: 1px solid #fed7aa; }
    .alert-item-medium   { background: #fefce8; border: 1px solid #fde047; }
    .alert-item-low      { background: #f0fdf4; border: 1px solid #bbf7d0; }

    /* ── Reports page ────────────────────────────────────────────────────── */
    .stat-pill { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); padding: 1.2rem 1.5rem; text-align: center; transition: transform .2s; }
    .stat-pill:hover { transform: translateY(-2px); }
    .stat-pill-val { font-size: 1.8rem; font-weight: 800; }
    .stat-pill-lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: #64748b; margin-top: 2px; }
    .comp-progress-item { margin-bottom: 14px; }
    .comp-progress-item .prog-label { display: flex; justify-content: space-between; font-size: .82rem; margin-bottom: 4px; }
    .comp-bar { height: 8px; border-radius: 8px; }

    /* ── Extract page ────────────────────────────────────────────────────── */
    .extract-textarea { font-family: 'SF Mono', 'Fira Code', monospace; font-size: .8rem; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px; resize: vertical; color: #334155; }
    .extract-textarea:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .field-row td { padding: 7px 10px; border-top: 1px solid #f1f5f9; font-size: .875rem; }
    .field-row td:first-child { font-size: .7rem; text-transform: uppercase; letter-spacing: .4px; color: #94a3b8; width: 40%; }

    /* ── Loading spinner ─────────────────────────────────────────────────── */
    .loading-overlay { text-align: center; padding: 3rem; color: #94a3b8; }

    /* ── Misc ────────────────────────────────────────────────────────────── */
    .page-eyebrow { font-size: .75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .back-btn { font-size: .82rem; color: #64748b; text-decoration: none; }
    .back-btn:hover { color: #0f172a; }
    .expired-tag { background: #fef2f2; color: #b91c1c; font-size: .65rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; vertical-align: middle; }
    .investigation-banner { background: linear-gradient(90deg, #fef2f2, #fff5f5); border: 1px solid #fca5a5; border-radius: 10px; padding: .75rem 1rem; color: #b91c1c; font-weight: 600; font-size: .9rem; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-xl">
      <a class="navbar-brand" href="/">
        <i class="bi bi-shield-fill-check shield-icon"></i>VendorRisk
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-4 me-auto gap-1">
          <li class="nav-item">
            <a class="nav-link {% block nav_vendors %}{% endblock %}" href="/">
              <i class="bi bi-grid-3x3-gap me-1"></i>Vendors
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_reports %}{% endblock %}" href="/reports">
              <i class="bi bi-bar-chart-line me-1"></i>Reports
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_extract %}{% endblock %}" href="/extract">
              <i class="bi bi-file-earmark-text me-1"></i>Extract
            </a>
          </li>
        </ul>
        <a href="/api/reports/csv" class="btn-export-nav text-decoration-none">
          <i class="bi bi-download me-1"></i>Export CSV
        </a>
      </div>
    </div>
  </nav>

  <div class="container-xl py-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
